<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/top.css">
    <link rel="stylesheet" href="styles/br.css">
    <title>helper css</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1281822003681691"
    crossorigin="anonymous"></script>
</head>
<body>
    <nav translate="no">
		<input type="checkbox" id="check">
		<label for="check" class="checkbtn">
			<span class="material-symbols-outlined" id="openMenu">
					menu
			</span>
		</label>
		<label class="logo" onclick="logoFunction()">
			<img src="img/title.svg" alt="" width=200px">
          
		</label>
		<ul id="menu">
			<li onclick="inicio()"><a id="ini" class="btn active"  href="#">border-radius</a></li>
			<li onclick="artes()" ><a id="art" class="btn" 		href="#">box-shadow</a></li>
			<li onclick="share()" ><a id="sha" class="btn" 		href="#">gradients</a></li>
		
		</ul>
	</nav>
    <section>
		<div class="cont" id="br">
            <div class="container">
                <!-- Column -->
                <div class="container__column" id="display1">
                    <div id="block">hellow ( :</div>
                    <textarea name="textValue" id="text" cols="30" rows="10" spellcheck="false">
    border-radius:3px;
    -webkit-border-radius: 3px;                       
                    </textarea>
                    <button id="copy" onclick="copy(this)">copy</button>
                </div>

                <div class="container__column" id="display2">
                    <div id="inputs">

                 
                    <div class="input" id="all">
                        <div class="inst">▣ all</div>
                        <input type="range" value="3" min="0" max="100" oninput="change(this.value,'all')" id="g0">
                        <div id="allValue" class="value">3px</div>
                    </div>


                    <div class="input" id="leftTop">
                        <div class="inst">◰ left Top</div>
                        <input type="range" value="3" min="0" max="100" oninput="change(this.value,'lt')" id="g1">
                        <div id="ltValue" class="value">3px</div>
                    </div>
                   
                    <div class="input" id="rightTop">
                        <div class="inst">◳ right Top</div>
                        <input type="range" value="3" min="0" max="100" oninput="change(this.value,'rt')" id="g2">
                        <div id="rtValue" class="value">3px</div>
                    </div>
                    <div class="input" id="leftBotom">
                        <div class="inst">◱ right Bottom</div>
                        <input type="range" value="3" min="0" max="100" oninput="change(this.value,'lb')" id="g3">
                        <div id="lbValue" class="value">3px</div>
                    </div>
                    <div class="input" id="rightBottom">
                        <div class="inst">◲ left Bottom</div>
                        <input type="range" value="3" min="0" max="100" oninput="change(this.value,'rb')" id="g4">
                        <div id="rbValue" class="value">3px</div>
                    </div>
                    <div id="maxConfig">
                        <div>Max</div>
                        <input type="number" value="100" id="max">
                        <button onclick="setMax()">OK</button>
                    </div>
                </div>
                <div id="add">
                    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1281822003681691"
                    crossorigin="anonymous"></script>
                    <ins class="adsbygoogle"
                    style="display:block"
                    data-ad-format="fluid"
                    data-ad-layout-key="-f9+5g+64-c7+1y"
                    data-ad-client="ca-pub-1281822003681691"
                    data-ad-slot="5162960366"></ins>
                    <script>
                    (adsbygoogle = window.adsbygoogle || []).push({});
                    </script>
                </div>
                </div>
           
            </div>
        </div>
	</section>
</body>

<style>
    :root{
        --color1:#272643;
        --color2:#2c698d;
        --color3:#bae8e8;
        --color4:#e3f6f5;
        --color5:#ffffff;

    }
</style>
<script src="scripts/menu.js"></script>
<script src="scripts/borderRadius.js"></script>

</html>
